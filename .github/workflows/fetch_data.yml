name: Fetch Live Data Loop

on:
  workflow_dispatch: # Allows manual testing
  repository_dispatch:
    types: [trigger-next-run] # Wakes up when cron-job.org pings it

jobs:
  run-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run data fetch script
      run: python fetch.py 

    - name: Commit and Push new files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add data/
        
        if [ -f "token_cache.json" ]; then
          git add token_cache.json
        fi
        
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated data archive (and token update if expired)"
          git pull origin main --rebase
          git push origin main
        else
          echo "No changes in data or token. Skipping commit."
        fi
