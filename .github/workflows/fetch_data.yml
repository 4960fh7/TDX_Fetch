name: Fetch Live Data Loop

on:
  workflow_dispatch: # Allows manual start
  repository_dispatch:
    types: [trigger-next-run]

jobs:
  run-loop:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run data fetch script
      run: python fetch.py 

    - name: Commit and Push new JSON files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff-index --quiet HEAD || (git commit -m "Automated data archive" && git push)

    - name: Check Time and Loop Freely
      if: always() # Ensures it evaluates even if a previous step had an issue
      uses: actions/github-script@v7
      with:
        script: |
          const date = new Date();
          // Adjust UTC to Taiwan Time (UTC+8)
          const twHour = (date.getUTCHours() + 8) % 24;
          const twMinute = date.getUTCMinutes();
          
          // Stop window: 1:00 AM to 4:30 AM
          if (twHour === 1 || twHour === 2 || twHour === 3 || (twHour === 4 && twMinute < 30)) {
            console.log("Outside active window. Ending loop cycle.");
            return;
          }
          
          console.log("Queueing next run in 5 minutes via repository dispatch...");
          // This triggers a fresh run asynchronously so this runner can shut down immediately
          setTimeout(async () => {
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'trigger-next-run'
            });
          }, 10);
