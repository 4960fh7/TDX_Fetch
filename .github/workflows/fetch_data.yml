name: Fetch Live Data Loop

on:
  workflow_dispatch: # Allows manual testing
  repository_dispatch:
    types: [trigger-next-run] # Wakes up when cron-job.org pings it

jobs:
  run-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run data fetch script
      run: python fetch.py 

    - name: Commit and Push new files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 1. Stage the files first so Git knows about them
        git add data/
        
        # 2. Check if there are actually changes to commit
        if ! git diff-index --quiet HEAD; then
          # 3. Pull latest changes, stashing your local staged changes automatically if needed
          git pull origin main --rebase --autostash
          
          # 4. Commit and push
          git commit -m "Automated data archive"
          git push origin main
        else
          echo "No changes detected, skipping commit."
        fi
