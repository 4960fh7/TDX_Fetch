name: Fetch Live Data

on:
  schedule:
    # 8:00 AM to 12:55 AM Taiwan Time (00:00 to 16:55 UTC)
    - cron: '*/5 0-16 * * *'
    
    # 4:30 AM to 4:55 AM Taiwan Time (20:30 to 20:55 UTC)
    - cron: '30,35,40,45,50,55 20 * * *'
    
    # 5:00 AM to 7:55 AM Taiwan Time (21:00 to 23:55 UTC)
    - cron: '*/5 21-23 * * *'

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Only installing 'requests' since the rest are built-in standard modules
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      run: python fetch.py # 👈 Replace with your actual script filename

    - name: Commit and Push all new JSON files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # This will stage all new timestamped JSON files regardless of where they are saved
        git add data/
        
        # Commit and push only if new files were created
        git diff-index --quiet HEAD || (git commit -m "Automated data archive: $(date)" && git push)
